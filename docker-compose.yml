version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: issat_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cursus
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cursus_network


  gadmin:
    image: dpage/pgadmin4
    container_name: cursus_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - cursus_network

volumes:
  postgres_data:

networks:
  cursus_network:
      driver: bridge
